name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest  # 必须用 Windows 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset --version=3.11.2 -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Package EXE
        run: |
          jpackage `
            --input target/ `
            --name YourApp `
            --main-jar your-app-1.0.jar `
            --main-class com.example.MainApplication `
            --type exe `
            --dest output/ `
            --win-dir-chooser `
            --win-menu `
            --win-shortcut `
            --app-version 1.0.0

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v3
        with:
          name: YourApp-installer
          path: output/*.exe
